<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminous Chaos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;700&family=Instrument+Serif:ital@0;1&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0d0d0d;
      width: 1200px;
      height: 1600px;
      overflow: hidden;
      position: relative;
    }
    
    .bg-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 30%, rgba(120,40,80,0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(40,60,120,0.12) 0%, transparent 50%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(80,20,40,0.1) 0%, transparent 40%);
    }
    
    .noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.04;
      pointer-events: none;
    }
    
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 100px 100px;
    }
    
    .main-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }
    
    .chaos {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 180px;
      font-weight: 700;
      color: transparent;
      background: linear-gradient(180deg, 
        rgba(255,255,255,0.95) 0%, 
        rgba(255,220,200,0.8) 50%,
        rgba(255,180,150,0.6) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: 30px;
      line-height: 0.9;
      text-shadow: 0 0 100px rgba(255,200,150,0.3);
    }
    
    .luminous {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 28px;
      font-style: italic;
      color: rgba(255,255,255,0.5);
      letter-spacing: 40px;
      margin-top: 30px;
    }
    
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
    }
    
    .arc {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    
    .arc-1 {
      width: 800px;
      height: 800px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .arc-2 {
      width: 900px;
      height: 900px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(255,200,150,0.04);
    }
    
    .arc-3 {
      width: 700px;
      height: 700px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(150,180,255,0.05);
    }
    
    .line-h {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    
    .line-v {
      position: absolute;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    
    .corner {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    
    .corner-tl { top: 60px; left: 60px; border-right: none; border-bottom: none; }
    .corner-tr { top: 60px; right: 60px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 60px; left: 60px; border-right: none; border-top: none; }
    .corner-br { bottom: 60px; right: 60px; border-left: none; border-top: none; }
    
    .markers {
      position: absolute;
      bottom: 80px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 100px;
      color: rgba(255,255,255,0.15);
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    .marker-left, .marker-right {
      display: flex;
      gap: 30px;
    }
    
    .gold-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, rgba(212,175,55,0.9) 0%, rgba(212,175,55,0) 70%);
      border-radius: 50%;
    }
    
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
    }
    
    .orb-1 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(180,80,120,0.5) 0%, transparent 70%);
      top: 10%;
      left: 5%;
    }
    
    .orb-2 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(80,100,180,0.4) 0%, transparent 70%);
      bottom: 20%;
      right: 10%;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <svg class="noise" viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>
  
  <div class="grid"></div>
  
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  
  <div class="arc arc-1"></div>
  <div class="arc arc-2"></div>
  <div class="arc arc-3"></div>
  
  <div class="main-text">
    <div class="chaos">CHAOS</div>
    <div class="luminous">luminous — disorder — beauty</div>
  </div>
  
  <div class="line-h" style="top: 250px; left: 100px; right: 100px;"></div>
  <div class="line-h" style="top: 350px; left: 200px; right: 200px; opacity: 0.5;"></div>
  <div class="line-v" style="left: 150px; top: 100px; bottom: 100px;"></div>
  <div class="line-v" style="right: 150px; top: 100px; bottom: 100px;"></div>
  
  <div class="gold-dot" style="top: 25%; left: 20%;"></div>
  <div class="gold-dot" style="top: 30%; right: 25%;"></div>
  <div class="gold-dot" style="bottom: 30%; left: 30%;"></div>
  
  <div class="markers">
    <div class="marker-left">
      <span>Series I</span>
      <span>∞ ÷ 1</span>
      <span>Entropy</span>
    </div>
    <div class="marker-right">
      <span>2026</span>
      <span>No. 07</span>
    </div>
  </div>
  
  <script>
    // Create particles
    const particles = document.querySelector('.particles');
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.opacity = Math.random() * 0.5 + 0.1;
      p.style.width = Math.random() * 2 + 1 + 'px';
      p.style.height = p.style.width;
      particles.appendChild(p);
    }
  </script>
</body>
</html>
