<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Neon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0f;
      width: 1200px;
      height: 1600px;
      overflow: hidden;
      position: relative;
    }
    
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.1) 2px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 100;
    }
    
    .glow-line-h {
      position: absolute;
      height: 2px;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, transparent, rgba(0,255,255,0.8), rgba(255,0,255,0.8), transparent);
      box-shadow: 0 0 20px rgba(0,255,255,0.5), 0 0 40px rgba(255,0,255,0.3);
    }
    
    .glow-line-v {
      position: absolute;
      width: 2px;
      top: 0;
      bottom: 0;
      background: linear-gradient(180deg, transparent, rgba(255,0,255,0.8), rgba(0,255,255,0.8), transparent);
      box-shadow: 0 0 20px rgba(255,0,255,0.5), 0 0 40px rgba(0,255,255,0.3);
    }
    
    .neon-bar {
      position: absolute;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      height: 3px;
      box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #ff00ff;
    }
    
    .neon-bar-h1 { top: 100px; left: 0; right: 0; }
    .neon-bar-h2 { bottom: 100px; left: 0; right: 0; }
    .neon-bar-v1 { top: 0; bottom: 0; left: 100px; width: 3px; background: linear-gradient(180deg, #ff00ff, #00ffff); }
    .neon-bar-v2 { top: 0; bottom: 0; right: 100px; width: 3px; background: linear-gradient(180deg, #00ffff, #ff00ff); }
    
    .glitch-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 160px;
      font-weight: 900;
      color: #fff;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff,
        3px 3px 0 #ff00ff,
        -3px -3px 0 #00ffff;
      letter-spacing: 15px;
      z-index: 10;
    }
    
    .glitch-text::before,
    .glitch-text::after {
      content: 'CYBER';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch-text::before {
      color: #00ffff;
      animation: glitch-1 2s infinite linear alternate-reverse;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    }
    
    .glitch-text::after {
      color: #ff00ff;
      animation: glitch-2 3s infinite linear alternate-reverse;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    }
    
    @keyframes glitch-1 {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-5px, 2px); }
      40% { transform: translate(5px, -2px); }
      60% { transform: translate(-3px, 1px); }
      80% { transform: translate(3px, -1px); }
    }
    
    @keyframes glitch-2 {
      0%, 100% { transform: translate(0); }
      25% { transform: translate(4px, -3px); }
      50% { transform: translate(-4px, 3px); }
      75% { transform: translate(2px, -1px); }
    }
    
    .subtitle {
      position: absolute;
      top: calc(50% + 130px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      color: #00ffff;
      letter-spacing: 25px;
      text-shadow: 0 0 10px #00ffff;
      z-index: 10;
    }
    
    .hex-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.1;
    }
    
    .corner-frame {
      position: absolute;
      width: 150px;
      height: 150px;
      border: 2px solid transparent;
    }
    
    .corner-frame::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #00ffff;
      box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
    }
    
    .corner-tl { top: 40px; left: 40px; border-top: 2px solid #00ffff; border-left: 2px solid #00ffff; }
    .corner-tl::before { top: -2px; left: -2px; }
    
    .corner-tr { top: 40px; right: 40px; border-top: 2px solid #ff00ff; border-right: 2px solid #ff00ff; }
    .corner-tr::before { top: -2px; right: -2px; background: #ff00ff; box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff; }
    
    .corner-bl { bottom: 40px; left: 40px; border-bottom: 2px solid #ff00ff; border-left: 2px solid #ff00ff; }
    .corner-bl::before { bottom: -2px; left: -2px; background: #ff00ff; box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff; }
    
    .corner-br { bottom: 40px; right: 40px; border-bottom: 2px solid #00ffff; border-right: 2px solid #00ffff; }
    .corner-br::before { bottom: -2px; right: -2px; }
    
    .data-stream {
      position: absolute;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(0,255,255,0.4);
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 5px;
    }
    
    .data-left { left: 50px; top: 200px; }
    .data-right { right: 50px; top: 200px; writing-mode: vertical-lr; }
    
    .hologram-box {
      position: absolute;
      border: 1px solid rgba(0,255,255,0.3);
      padding: 15px 25px;
      background: rgba(0,255,255,0.02);
    }
    
    .hologram-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00ffff, transparent);
    }
    
    .box-1 { top: 180px; left: 50px; }
    .box-2 { bottom: 180px; right: 50px; }
    
    .hologram-box span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(0,255,255,0.6);
      letter-spacing: 3px;
    }
    
    .neon-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .circle-1 {
      width: 600px;
      height: 600px;
      border-color: rgba(0,255,255,0.15);
      box-shadow: 0 0 30px rgba(0,255,255,0.1), inset 0 0 30px rgba(0,255,255,0.05);
    }
    
    .circle-2 {
      width: 500px;
      height: 500px;
      border-color: rgba(255,0,255,0.1);
      box-shadow: 0 0 30px rgba(255,0,255,0.08);
    }
    
    .circle-3 {
      width: 400px;
      height: 400px;
      border-color: rgba(0,255,255,0.08);
    }
    
    .crosshair {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,0,255,0.5);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
    }
    
    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,0,255,0.3);
    }
    
    .crosshair::before {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
    }
    
    .crosshair::after {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
    }
    
    .markers {
      position: absolute;
      bottom: 50px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 80px;
      color: rgba(0,255,255,0.4);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
    }
    
    .warning {
      position: absolute;
      top: 50px;
      right: 80px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: #ff00ff;
      letter-spacing: 3px;
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanlines"></div>
  
  <div class="glow-line-h glow-line-h1"></div>
  <div class="glow-line-h glow-line-h2"></div>
  <div class="glow-line-v glow-line-v1"></div>
  <div class="glow-line-v glow-line-v2"></div>
  
  <div class="neon-bar neon-bar-h1"></div>
  <div class="neon-bar neon-bar-h2"></div>
  <div class="neon-bar neon-bar-v1"></div>
  <div class="neon-bar neon-bar-v2"></div>
  
  <div class="corner-frame corner-tl"></div>
  <div class="corner-frame corner-tr"></div>
  <div class="corner-frame corner-bl"></div>
  <div class="corner-frame corner-br"></div>
  
  <div class="hex-pattern"></div>
  
  <div class="neon-circle circle-1"></div>
  <div class="neon-circle circle-2"></div>
  <div class="neon-circle circle-3"></div>
  <div class="crosshair"></div>
  
  <div class="glitch-text">CYBER</div>
  <div class="subtitle">NEON // DREAMS // 2026</div>
  
  <div class="data-stream data-left">
    01001001 01000111 01001110 01001111 01010010 01000101
  </div>
  <div class="data-stream data-right">
    01000100 01000001 01010100 01000001 00100000 01010011
  </div>
  
  <div class="hologram-box box-1">
    <span>SECTOR: 7G</span>
  </div>
  <div class="hologram-box box-2">
    <span>NEURAL: ONLINE</span>
  </div>
  
  <div class="warning">⚠ SYSTEM ACTIVE</div>
  
  <div class="markers">
    <span>VER: 2.0.26</span>
    <span>LAT: 31.2304°N</span>
    <span>LON: 121.4737°E</span>
    <span>NYC // TKY // SHA</span>
  </div>
</body>
</html>
