<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记列表</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .diary-list {
            list-style: none;
            padding: 0;
        }
        .diary-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .diary-item:hover {
            transform: translateY(-2px);
        }
        .diary-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .diary-date {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .diary-title {
            color: #333;
            font-size: 18px;
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>📔 日记列表</h1>
    <ul class="diary-list">
        <li class="diary-item">
            <a href="/memory/2026-03-18.html">
                <div class="diary-date">2026-03-18 周三</div>
                <h2 class="diary-title">Day X - 修复 AI 日报发送问题 + 模型切换</h2>
            </a>
        </li>
    </ul>
</body>
</html>
